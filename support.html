<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support | CanopyMD</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #08110b;
      color: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 48px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 52px;
      margin-top: 0;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }

    .email {
      display: inline-block;
      margin-top: 18px;
      font-size: 20px;
      color: #8de5a1;
      text-decoration: none;
      font-weight: 700;
    }

    .back {
      display: inline-block;
      margin-bottom: 24px;
      color: #8de5a1;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">← Back to Home</a>

    <h1>Support</h1>

    <p>
      Need help with CanopyMD, diagnosis results, app issues,
      or feedback?
    </p>

    <p>
      Reach out anytime and we’ll do our best to help.
    </p>

    <a class="email" href="mailto:support@canopymd.com">
      support@canopymd.com
    </a>
  </div>
</body>
</html>
